openapi: 3.0.3
info:
  title: Shibui UI Showcase API
  version: 1.0.0
  description: Contrato de datos para la librería de componentes y su showcase.

paths:
  /components:
    get:
      summary: Obtener lista de componentes
      operationId: getComponents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Component'

  /categories:
    get:
      summary: Obtener categorías del menú
      operationId: getCategories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /users:
    get:
      summary: Obtener lista de usuarios (Admin only)
      operationId: getUsers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /config/settings:
    get:
      summary: Obtener ajustes globales
      operationId: getAppSettings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'

components:
  schemas:
    # --- CONFIGURACIÓN ---
    AppSettings:
      type: object
      required: [maintenance]
      properties:
        maintenance: { type: boolean }
        latest_release_date: { type: string, format: date-time }
        banner:
          type: object
          properties:
            active: { type: boolean }
            message: { type: string }
            type: { type: string, enum: [info, warning, success] }

    # --- USUARIOS ---
    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [admin, editor, viewer] }

    # --- CATEGORÍAS ---
    Category:
      type: object
      required: [id, name, slug, order]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        order: { type: number }
        icon: { type: string }

    # --- COMPONENTES ---
    Component:
      type: object
      required: [id, name, slug, category_id]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        category_id: { type: string }
        status: { type: string, enum: [stable, beta, deprecated] }
        description: { type: string }
        version: { type: string }
        tags:
          type: array
          items: { type: string }
        api:
          $ref: '#/components/schemas/ComponentAPI'
        content:
          $ref: '#/components/schemas/ComponentContent'

    # --- DETALLES TÉCNICOS ---
    ComponentAPI:
      type: object
      properties:
        props:
          type: array
          items:
            $ref: '#/components/schemas/PropDefinition'
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventDefinition'

    PropDefinition:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        default: { type: string }
        desc: { type: string }

    EventDefinition:
      type: object
      properties:
        name: { type: string }
        payload: { type: string }
        desc: { type: string }

    ComponentContent:
      type: object
      properties:
        usage_md: { type: string }
        codes:
          type: object
          properties:
            react: { type: string }
            angular: { type: string }
            svelte: { type: string }