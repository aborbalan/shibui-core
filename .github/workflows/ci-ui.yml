name: CI — UI & Apps

# Este workflow nunca se dispara directamente.
# Solo el orquestador puede invocarlo, pasándole
# los outputs de detect-changes como inputs.
on:
  workflow_call:
    inputs:
      ui:
        description: "¿Han cambiado ficheros en packages/shibui-ui?"
        type: string
        required: true
      react:
        description: "¿Han cambiado ficheros en apps/app-react?"
        type: string
        required: true
      angular:
        description: "¿Han cambiado ficheros en apps/app-angular?"
        type: string
        required: true
      svelte:
        description: "¿Han cambiado ficheros en apps/app-svelte?"
        type: string
        required: true
      ref:
        description: "Ref del branch que disparó el orquestador (ej: refs/heads/main)"
        type: string
        required: true

env:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "9.15.0"

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Quality Gate
  # ─────────────────────────────────────────
  quality:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    if: inputs.ui == 'true' || inputs.react == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔎 Type Check
        run: pnpm --filter @shibui-ui/ui type-check

      - name: 🧹 Lint
        run: pnpm --filter @shibui-ui/ui lint

  # ─────────────────────────────────────────
  # JOB 2 — Build UI Library + Storybook
  # Solo si cambia la lib UI
  # ─────────────────────────────────────────
  build-ui:
    name: 🏗️ Build UI Library
    runs-on: ubuntu-latest
    needs: quality
    if: inputs.ui == 'true' && needs.quality.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Library
        run: pnpm --filter @shibui-ui/ui build

      - name: 🎡 Build Storybook
        run: pnpm --filter @shibui-ui/ui build-storybook

      - name: 📤 Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static-${{ github.run_id }}
          path: packages/shibui-ui/storybook-static/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3 — Build React App
  # FIX: No depende de build-ui. Construye la lib
  # como peer dependency propia para evitar el skip
  # transitivo cuando solo cambia apps/app-react.
  # ─────────────────────────────────────────
  build-react:
    name: 📦 Build React App
    runs-on: ubuntu-latest
    needs: quality
    if: inputs.react == 'true' && needs.quality.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build UI lib (peer dependency)
        run: pnpm --filter @shibui-ui/ui build

      - name: 📦 Build React App
        run: pnpm --filter app-react build

      - name: 📤 Upload React dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist-${{ github.run_id }}
          path: apps/app-react/dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 4 — Build Angular App
  # FIX: Mismo patrón que build-react.
  # ─────────────────────────────────────────
  build-angular:
    name: 📦 Build Angular App
    runs-on: ubuntu-latest
    needs: quality
    if: inputs.angular == 'true' && needs.quality.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build UI lib (peer dependency)
        run: pnpm --filter @shibui-ui/ui build

      - name: 📦 Build Angular App
        run: pnpm --filter app-angular build

      - name: 📤 Upload Angular dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist-${{ github.run_id }}
          path: apps/app-angular/dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 5 — Build Svelte App
  # FIX: Mismo patrón que build-react.
  # ─────────────────────────────────────────
  build-svelte:
    name: 📦 Build Svelte App
    runs-on: ubuntu-latest
    needs: quality
    if: inputs.svelte == 'true' && needs.quality.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build UI lib (peer dependency)
        run: pnpm --filter @shibui-ui/ui build

      - name: 📦 Build Svelte App
        run: pnpm --filter app-svelte build

      - name: 📤 Upload Svelte dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: svelte-dist-${{ github.run_id }}
          path: apps/app-svelte/dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 6 — Semantic Release + Publish NPM
  # Solo en main, después de build-ui.
  # ─────────────────────────────────────────
  release:
    name: 🚀 Semantic Release
    runs-on: ubuntu-latest
    needs: [build-ui]
    if: |
      inputs.ref == 'refs/heads/main' &&
      (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped')
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: 🏗️ Build UI lib (con versión bumpeada)
        run: pnpm --filter @shibui-ui/ui build

      - name: 📦 Publish to npm (OIDC Provenance)
        working-directory: packages/shibui-ui
        run: npm publish --provenance --access public

  # ─────────────────────────────────────────
  # JOB 7 — Deploy Apps a Firebase
  # Solo en main/develop. Tolera builds skipped.
  # ─────────────────────────────────────────
  deploy-apps:
    name: 🚀 Deploy Apps to Firebase
    runs-on: ubuntu-latest
    needs:
      - build-ui
      - build-react
      - build-angular
      - build-svelte
    if: |
      (inputs.ref == 'refs/heads/main' || inputs.ref == 'refs/heads/develop') &&
      needs.build-ui.result != 'failure' &&
      needs.build-react.result != 'failure' &&
      needs.build-angular.result != 'failure' &&
      needs.build-svelte.result != 'failure'
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Download Storybook artifact
        if: needs.build-ui.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: storybook-static-${{ github.run_id }}
          path: packages/shibui-ui/storybook-static/

      - name: 🚀 Deploy Storybook
        if: needs.build-ui.result == 'success'
        run: pnpm exec firebase deploy --only hosting:storybook --non-interactive --project lib-ui-b67c5

      - name: 📥 Download React dist artifact
        if: needs.build-react.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: react-dist-${{ github.run_id }}
          path: apps/app-react/dist/

      - name: 🚀 Deploy React App
        if: needs.build-react.result == 'success'
        run: pnpm exec firebase deploy --only hosting:react --non-interactive --project lib-ui-b67c5

      - name: 📥 Download Angular dist artifact
        if: needs.build-angular.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: angular-dist-${{ github.run_id }}
          path: apps/app-angular/dist/

      - name: 🚀 Deploy Angular App
        if: needs.build-angular.result == 'success'
        run: pnpm exec firebase deploy --only hosting:angular --non-interactive --project lib-ui-b67c5

      - name: 📥 Download Svelte dist artifact
        if: needs.build-svelte.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: svelte-dist-${{ github.run_id }}
          path: apps/app-svelte/dist/

      - name: 🚀 Deploy Svelte App
        if: needs.build-svelte.result == 'success'
        run: pnpm exec firebase deploy --only hosting:svelte --non-interactive --project lib-ui-b67c5