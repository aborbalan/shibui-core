name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: 
      - main
      - develop
      - feature/**

jobs:
  build_test_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write  
    timeout-minutes: 60

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🔍 Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            ui: 'packages/shibui-ui/**'
            react: 'apps/app-react/**'
            angular: 'apps/app-angular/**'
            svelte: 'apps/app-svelte/**'

      - name: 🥡 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      # --- SECCIÓN PLAYWRIGHT ---
      - name: 🎭 Install Playwright Browsers
        run: pnpm --filter @shibui-ui/ui exec playwright install --with-deps

      - name: 🧪 Run Playwright Tests
        run: pnpm --filter @shibui-ui/ui exec playwright test || true

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/shibui-ui/playwright-report/
          retention-days: 30

      - name: ✅ Quality & Core Build
        if: steps.changes.outputs.ui == 'true' || steps.changes.outputs.react == 'true'
        run: |
          pnpm --filter @shibui-ui/ui type-check
          pnpm --filter @shibui-ui/ui lint
          pnpm --filter @shibui-ui/ui build

      - name: 🎡 Build Storybook
        if: steps.changes.outputs.ui == 'true'
        run: pnpm --filter @shibui-ui/ui build-storybook

      - name: 🚀 Run Semantic Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
      
      - name: 📦 Publish to npm (Trusted Publisher)
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public --no-git-checks
        working-directory: packages/shibui-ui
        env:
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

      - name: 📦 Build React App
        if: steps.changes.outputs.react == 'true'
        run: pnpm --filter app-react build

      - name: 📄 Generate OpenAPI spec
        if: steps.changes.outputs.ui == 'true' || github.ref == 'refs/heads/main'
        run: pnpm --filter @shibui-ui/api generate:openapi
        env:
          DOCS_OUTPUT_DIR: ${{ github.workspace }}/apps/shibui-api/docs-dist

      - name: 🚀 Targeted Deploy to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ "${{ steps.changes.outputs.ui }}" == "true" ]; then
            pnpm exec firebase deploy --only hosting:storybook --non-interactive --project lib-ui-b67c5
          fi
          if [ "${{ steps.changes.outputs.react }}" == "true" ]; then
            pnpm exec firebase deploy --only hosting:react --non-interactive --project lib-ui-b67c5
          fi
          pnpm exec firebase deploy --only hosting:shibui-api --non-interactive --project lib-ui-b67c5

      - name: 📢 Notify Discord
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.actor }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr -d '"' | tr -d '\n' | tr -d '\r')
          curl -H "Content-Type: application/json" -X POST -d "{
                 \"content\": \"🚀 **Nueva actualización de @shibui-ui/ui**\",
                 \"embeds\": [{
                   \"title\": \"Versión $VERSION desplegada con éxito\",
                   \"description\": \"**Cambios:** $CLEAN_MSG\n**Autor:** $COMMIT_AUTHOR\",
                   \"url\": \"https://lib-ui-b67c5.web.app\",
                   \"color\": 5814783,
                   \"footer\": { \"text\": \"Shibui UI - CI/CD System\" }
                 }]
               }" "$DISCORD_URL"