name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: 
      - main
      - develop
      - feature/**

jobs:
  build_test_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # 👈 Crucial: Permite a GitHub generar el token OIDC [1]
      contents: write # Requerido para que Semantic Release cree etiquetas y notas [2]s tags de versión a Git
      pull-requests: write
    timeout-minutes: 60
    

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

            # 1. DETECCIÓN DE CAMBIOS (Ahorro de recursos) [2]
      - uses: dorny/paths-filter@v3
        id: changes
        with:
              filters: |
                ui:
                  - 'packages/shibui-ui/**'
                react: 'apps/app-react/**'
                angular: 'apps/app-angular/**'
                svelte: 'apps/app-svelte/**'
                apps:
                  
      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install Dependencies
        run: npm ci --ignore-scripts 
        working-directory: .

      # --- SECCIÓN PLAYWRIGHT (Integrada) ---
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: .

      - name: 🧪 Run Playwright Tests
        run: npx playwright test
        working-directory: .
        # Si Playwright genera el reporte fuera de la carpeta de la lib, 
        # asegúrate de que el path en el artifact sea correcto.

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Se sube aunque fallen los tests para poder ver el error
        with:
          name: playwright-report
          path: packages/shibui-ui/playwright-report/
          retention-days: 30


      - name: ✅ Quality & Core Build
        if: steps.changes.outputs.ui == 'true' || steps.changes.outputs.react == 'true'
        run: |
          npm run type-check -w @shibui/ui
          npm run lint -w @shibui/ui
          npm run build -w @shibui/ui

      - name: 🎡 Build Storybook
        if: steps.changes.outputs.ui == 'true'
        run: npm run build-storybook -w @shibui/ui

      - name: 🚀 Run Semantic Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

 # 3. SECCIÓN DE APPS (Solo si hay cambios en React)
      - name: 📦 Build React App
        if: steps.changes.outputs.react == 'true'
        run: npm run build -w app-react

    # 4. DESPLIEGUE POR TARGETS (Programático) 
      - name: 🚀 Targeted Deploy to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Desplegar Storybook si cambió la lib
          if [ "${{ steps.changes.outputs.ui }}" == "true" ]; then
            npx firebase deploy --only hosting:storybook --non-interactive --project lib-ui-b67c5
          fi
          # Desplegar App React si cambió la app
          if [ "${{ steps.changes.outputs.react }}" == "true" ]; then
            npx firebase deploy --only hosting:react --non-interactive --project lib-ui-b67c5
          fi

      - name: 📢 Notify Discord
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.actor }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr -d '"' | tr -d '\n' | tr -d '\r')
          curl -H "Content-Type: application/json" -X POST -d "{
                 \"content\": \"🚀 **Nueva actualización de @shibui/ui**\",
                 \"embeds\": [{
                   \"title\": \"Versión $VERSION desplegada con éxito\",
                   \"description\": \"**Cambios:** $CLEAN_MSG\n**Autor:** $COMMIT_AUTHOR\",
                   \"url\": \"https://lib-ui-b67c5.web.app\",
                   \"color\": 5814783,
                   \"footer\": { \"text\": \"Shibui UI - CI/CD System\" }
                 }]
               }" "$DISCORD_URL"