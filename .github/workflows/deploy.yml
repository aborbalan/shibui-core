name: CI/CD - Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

# Cancela ejecuciones obsoletas del mismo branch para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "9.15.0"

jobs:
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      react: ${{ steps.filter.outputs.react }}
      angular: ${{ steps.filter.outputs.angular }}
      svelte: ${{ steps.filter.outputs.svelte }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:      'packages/shibui-ui/**'
            react:   'apps/app-react/**'
            angular: 'apps/app-angular/**'
            svelte:  'apps/app-svelte/**'
            api:     'apps/shibui-api/**'

  quality:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.react == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔎 Type Check
        run: pnpm --filter @shibui-ui/ui type-check

      - name: 🧹 Lint
        run: pnpm --filter @shibui-ui/ui lint

  test-e2e:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    # Siempre corre si quality pasó, incluso si no hay cambios en UI,
    # para garantizar que los tests no se saltan silenciosamente.
    if: always() && needs.quality.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      # Cache de browsers de Playwright — evita descargar ~300 MB en cada run
      - name: 🗄️ Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 🎭 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @shibui-ui/ui exec playwright install --with-deps

      - name: 🎭 Install System Dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @shibui-ui/ui exec playwright install-deps

      - name: 🧪 Run Playwright Tests
        # Sin || true: el job falla si los tests fallan.
        # Si un test es flaky, márquelo con test.fixme() o usa retries en playwright.config.ts
        run: pnpm --filter @shibui-ui/ui exec playwright test

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        # Se sube siempre para poder diagnosticar fallos
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: packages/shibui-ui/playwright-report/
          retention-days: 30 #wip ------

  build-ui:
    name: 🏗️ Build UI Library
    runs-on: ubuntu-latest
    needs: quality
    if: needs.detect-changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Library
        run: pnpm --filter @shibui-ui/ui build

      - name: 🎡 Build Storybook
        run: pnpm --filter @shibui-ui/ui build-storybook

      # Persiste el artefacto de Storybook para el job de deploy
      - name: 📤 Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static-${{ github.run_id }}
          path: packages/shibui-ui/storybook-static/
          retention-days: 1

  build-react:
    name: 📦 Build React App
    runs-on: ubuntu-latest
    needs: quality
    if: needs.detect-changes.outputs.react == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Build React App
        run: pnpm --filter app-react build

      - name: 📤 Upload React dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist-${{ github.run_id }}
          path: apps/app-react/dist/
          retention-days: 1

  build-api-docs:
    name: 📄 Generate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📄 Generate OpenAPI spec
        run: pnpm --filter @shibui-ui/api generate:openapi
        env:
          DOCS_OUTPUT_DIR: ${{ github.workspace }}/apps/shibui-api/docs-dist

      - name: 📤 Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-${{ github.run_id }}
          path: apps/shibui-api/docs-dist/
          retention-days: 1

  release:
    name: 🚀 Semantic Release
    runs-on: ubuntu-latest
    needs: [test-e2e, build-ui]
    # build-ui puede haberse saltado si no hubo cambios en UI.
    # El if permite que release corra si al menos uno de los dos tuvo éxito o fue saltado (skipped).
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.test-e2e.result == 'success') &&
      (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped')
    permissions:
      id-token: write # OIDC para npm provenance
      contents: write # Para que Semantic Release cree tags en Git
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Semantic Release lea el historial
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      # Semantic Release se encarga de:
      # 1. Calcular la nueva versión a partir de los commits
      # 2. Actualizar package.json en packages/shibui-ui (según .releaserc.json pkgRoot)
      # 3. Crear el tag de Git y la Release en GitHub
      # npmPublish: false en .releaserc.json → la publicación la hace el step siguiente con OIDC
      - name: 🚀 Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      # Publicación con OIDC (sin NPM_TOKEN hardcodeado)
      # Se ejecuta solo si Semantic Release generó una nueva versión (el tag existe)
      - name: 📦 Publish to npm (OIDC Provenance)
        working-directory: packages/shibui-ui
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}

  deploy:
    name: 🚀 Deploy to Firebase
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-ui
      - build-react
      - build-api-docs
    # Se ejecuta si al menos uno de los builds tuvo éxito (los demás pueden estar skipped)
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      (needs.build-ui.result == 'success' || needs.build-react.result == 'success' || needs.build-api-docs.result == 'success' ||
       needs.build-ui.result == 'skipped' || needs.build-react.result == 'skipped' || needs.build-api-docs.result == 'skipped')
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      # Descargamos los artefactos de build según lo que cambió
      - name: 📥 Download Storybook artifact
        if: needs.build-ui.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: storybook-static-${{ github.run_id }}
          path: packages/shibui-ui/storybook-static/

      - name: 📥 Download React dist artifact
        if: needs.build-react.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: react-dist-${{ github.run_id }}
          path: apps/app-react/dist/

      - name: 📥 Download API docs artifact
        if: needs.build-api-docs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: api-docs-${{ github.run_id }}
          path: apps/shibui-api/docs-dist/

      - name: 🚀 Deploy Storybook
        if: needs.build-ui.result == 'success'
        run: pnpm exec firebase deploy --only hosting:storybook --non-interactive --project lib-ui-b67c5

      - name: 🚀 Deploy React App
        if: needs.build-react.result == 'success'
        run: pnpm exec firebase deploy --only hosting:react --non-interactive --project lib-ui-b67c5

      - name: 🚀 Deploy API Docs
        # Solo si hay cambios en API o es main — ya filtrado por el job build-api-docs
        if: needs.build-api-docs.result == 'success'
        run: pnpm exec firebase deploy --only hosting:shibui-api --non-interactive --project lib-ui-b67c5

        notify:
          name: 📢 Notify Discord
          runs-on: ubuntu-latest
          needs: [deploy]
          if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
          steps:
            - uses: actions/checkout@v4

            - name: 📢 Send Discord Notification
              env:
                DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK }}
                COMMIT_MSG: ${{ github.event.head_commit.message }}
                COMMIT_AUTHOR: ${{ github.actor }}
              run: |
                # Apunta a la versión real publicada, no al package.json raíz (private: true)
                VERSION=$(node -p "require('./packages/shibui-ui/package.json').version")
                CLEAN_MSG=$(echo "$COMMIT_MSG" | tr -d '"' | tr -d '\n' | tr -d '\r')
                curl -H "Content-Type: application/json" -X POST -d "{
                  \"content\": \"🚀 **Nueva actualización de @shibui-ui/ui**\",
                  \"embeds\": [{
                    \"title\": \"Versión $VERSION desplegada con éxito\",
                    \"description\": \"**Cambios:** $CLEAN_MSG\n**Autor:** $COMMIT_AUTHOR\",
                    \"url\": \"https://lib-ui-b67c5.web.app\",
                    \"color\": 5814783,
                    \"footer\": { \"text\": \"Shibui UI — CI/CD System\" }
                  }]
                }" "$DISCORD_URL"
