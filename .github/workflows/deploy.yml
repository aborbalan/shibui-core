name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: 
      - main
      - develop
      - feature/**

jobs:
  build_test_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read      # Necesario para que nx-set-shas consulte ejecuciones previas
      contents: read
    timeout-minutes: 60


    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Nx compare cambios entre commits

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📦 Establecer SHAs para Nx
        uses: nrwl/nx-set-shas@v4 # Identifica qué cambió desde el último deploy exitoso
        with:
          main-branch-name: 'main'

      # --- SECCIÓN PLAYWRIGHT (Integrada) ---
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: .

      - name: 🧪 Run Playwright Tests
        run: npx playwright test
        working-directory: .
        # Si Playwright genera el reporte fuera de la carpeta de la lib, 
        # asegúrate de que el path en el artifact sea correcto.

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Se sube aunque fallen los tests para poder ver el error
        with:
          name: playwright-report
          path: packages/shibui-ui/playwright-report/
          retention-days: 30
      # ---------------------------------------

      - name: ✅ Type Check & Lint
        run: |
          npm run type-check
          npm run nx-lint 
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}


      - name: 📦 Build Afectados (Core + Apps)
        # Este comando usa el script 'nx-build' de package.json raíz
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: npm run nx-build
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

        
      - name: 🛠️ Install Firebase CLI
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: npm install -g firebase-tools

      - name: 🚀 Deploy to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          npx firebase target:apply hosting storybook shibui-showcase-storybook --config ../../firebase.json
          npx firebase target:apply hosting react shibui-showcase-react --config ../../firebase.json
          npx firebase target:apply hosting angular shibui-showcase-angular --config ../../firebase.json
          npx firebase target:apply hosting svelte shibui-showcase-svelte --config ../../firebase.json

          npx nx affected -t deploy
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          # Es vital incluir el token de Firebase para autorizar la subida [4]
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: 📢 Notify Discord
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.actor }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr -d '"' | tr -d '\n' | tr -d '\r')
          curl -H "Content-Type: application/json" -X POST -d "{
                 \"content\": \"🚀 **Nueva actualización de @shibui/ui**\",
                 \"embeds\": [{
                   \"title\": \"Versión $VERSION desplegada con éxito\",
                   \"description\": \"**Cambios:** $CLEAN_MSG\n**Autor:** $COMMIT_AUTHOR\",
                   \"url\": \"https://lib-ui-b67c5.web.app\",
                   \"color\": 5814783,
                   \"footer\": { \"text\": \"Shibui UI - CI/CD System\" }
                 }]
               }" "$DISCORD_URL"