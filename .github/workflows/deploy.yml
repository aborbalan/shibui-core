name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: 
      - main
      - develop
      - feature/**

jobs:
  build_test_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    defaults:
      run:
        working-directory: packages/shibui-ui

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci
        working-directory: .

      # --- SECCIÓN PLAYWRIGHT (Integrada) ---
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: .

      - name: 🧪 Run Playwright Tests
        run: npx playwright test
        working-directory: .
        # Si Playwright genera el reporte fuera de la carpeta de la lib, 
        # asegúrate de que el path en el artifact sea correcto.

      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Se sube aunque fallen los tests para poder ver el error
        with:
          name: playwright-report
          path: packages/shibui-ui/playwright-report/
          retention-days: 30
      # ---------------------------------------

      - name: ✅ Type Check & Lint
        run: |
          npm run type-check
          npm run lint

      - name: 📦 Build Library
        run: npm run build

      - name: 🎡 Build Storybook
        run: npm run build-storybook

      - name: 🚀 Deploy to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
            npx firebase-tools deploy --only hosting --site shibui-showcase-storybook --token "${{ secrets.FIREBASE_TOKEN }}" --project lib-ui-b67c5
    
            npx firebase-tools deploy --only hosting --site lib-ui-b67c5 --token "${{ secrets.FIREBASE_TOKEN }}" --project lib-ui-b67c5

      - name: 📢 Notify Discord
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.actor }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr -d '"' | tr -d '\n' | tr -d '\r')
          curl -H "Content-Type: application/json" -X POST -d "{
                 \"content\": \"🚀 **Nueva actualización de @shibui/ui**\",
                 \"embeds\": [{
                   \"title\": \"Versión $VERSION desplegada con éxito\",
                   \"description\": \"**Cambios:** $CLEAN_MSG\n**Autor:** $COMMIT_AUTHOR\",
                   \"url\": \"https://lib-ui-b67c5.web.app\",
                   \"color\": 5814783,
                   \"footer\": { \"text\": \"Shibui UI - CI/CD System\" }
                 }]
               }" "$DISCORD_URL"