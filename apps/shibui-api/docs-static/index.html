<!doctype html>
<html lang="en">
  <head>
    <title>Shibui UI — API Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="REST API reference for the Shibui UI component library." />
    <style>
      body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: './openapi.json',
        theme: 'saturn',
        layout: 'modern',
        defaultHttpClient: {
          targetKey: 'javascript',
          clientKey: 'fetch',
        },
      })
    </script>
  </body>
</html>
